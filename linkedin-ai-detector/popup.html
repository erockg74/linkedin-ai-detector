<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }

    .version {
      font-size: 11px;
      color: #666;
      margin-bottom: 14px;
    }

    /* Sections */
    .section {
      border-bottom: 1px solid #333;
      padding-bottom: 12px;
      margin-bottom: 12px;
    }

    .section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
    }

    /* API key input */
    .api-key-wrap {
      display: flex;
      gap: 6px;
    }

    .api-key-input {
      flex: 1;
      padding: 6px 8px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    .api-key-input:focus {
      border-color: #666;
    }

    .api-key-input::placeholder {
      color: #555;
    }

    .btn-save {
      padding: 6px 12px;
      background: #333;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }

    .btn-save:hover {
      background: #444;
      color: #fff;
    }

    .btn-save.saved {
      background: #166534;
      border-color: #22c55e;
      color: #22c55e;
    }

    .btn-test {
      padding: 6px 12px;
      background: #333;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }

    .btn-test:hover {
      background: #444;
      color: #fff;
    }

    .btn-test.testing {
      opacity: 0.6;
      cursor: wait;
    }

    .btn-test.pass {
      background: #166534;
      border-color: #22c55e;
      color: #22c55e;
    }

    .btn-test.fail {
      background: #7f1d1d;
      border-color: #f87171;
      color: #f87171;
    }

    .api-status {
      font-size: 11px;
      margin-top: 4px;
      min-height: 14px;
    }

    .api-status.ok { color: #22c55e; }
    .api-status.missing { color: #f87171; }
    .api-status.testing { color: #fbbf24; }

    /* Sensitivity presets */
    .preset-wrap {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .preset-btn {
      flex: 1;
      padding: 7px 0;
      background: #2a2a2a;
      color: #999;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      transition: all 0.15s;
    }

    .preset-btn:hover {
      background: #333;
      color: #ccc;
    }

    .preset-btn.active {
      border-color: #666;
      color: #fff;
      background: #333;
    }

    .preset-btn.active.aggressive {
      border-color: #f87171;
      color: #f87171;
    }

    .preset-btn.active.permissive {
      border-color: #22c55e;
      color: #22c55e;
    }

    .preset-btn.active.off {
      border-color: #94a3b8;
      color: #94a3b8;
    }

    /* Slider — no value label, just the track */
    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .slider-label {
      font-size: 10px;
      color: #666;
      white-space: nowrap;
      user-select: none;
    }

    .slider-label.left { margin-right: 8px; }
    .slider-label.right { margin-left: 8px; }

    .sensitivity-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: #444;
      border-radius: 2px;
      outline: none;
    }

    .sensitivity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e0e0e0;
      cursor: pointer;
      border: 2px solid #666;
      transition: background 0.15s;
    }

    .sensitivity-slider::-webkit-slider-thumb:hover {
      background: #fff;
    }

    .sensitivity-slider:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .sensitivity-slider:disabled::-webkit-slider-thumb {
      cursor: default;
    }

    .sensitivity-desc {
      font-size: 11px;
      color: #777;
      margin-top: 6px;
      text-align: center;
    }

    /* Stats */
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }

    .stat-value {
      font-weight: 700;
      color: #fff;
      font-size: 14px;
    }

    .stat-label {
      color: #999;
    }

    /* Reset button */
    .btn-reset {
      margin-top: 8px;
      width: 100%;
      padding: 6px;
      background: #333;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }

    .btn-reset:hover {
      background: #444;
      color: #fff;
    }
  </style>
</head>
<body>
  <h1>AI Post Detector</h1>
  <div class="version">v2.4 — Claude Haiku scoring</div>

  <div class="section">
    <label for="apiKey">Anthropic API Key</label>
    <div class="api-key-wrap">
      <input type="password" id="apiKey" class="api-key-input" placeholder="sk-ant-..." spellcheck="false" autocomplete="off">
      <button class="btn-save" id="saveKey">Save</button>
      <button class="btn-test" id="testKey">Test</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <div class="section">
    <label>Filter Strength</label>
    <div class="preset-wrap">
      <button class="preset-btn aggressive" id="presetAggressive">Aggressive</button>
      <button class="preset-btn permissive" id="presetPermissive">Permissive</button>
      <button class="preset-btn off" id="presetOff">Off</button>
    </div>
    <div class="slider-wrap">
      <span class="slider-label left">More filtering</span>
      <input type="range" id="sensitivity" class="sensitivity-slider" min="10" max="90" value="30">
      <span class="slider-label right">Less filtering</span>
    </div>
    <div class="sensitivity-desc" id="sensitivityDesc">Scores shown on all posts</div>
  </div>

  <div class="section">
    <div class="row">
      <span class="stat-label">Posts scanned</span>
      <span class="stat-value" id="scanned">0</span>
    </div>
    <div class="row">
      <span class="stat-label">Posts collapsed</span>
      <span class="stat-value" id="collapsed">0</span>
    </div>
    <button class="btn-reset" id="reset">Reset stats</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
