<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }

    .version {
      font-size: 11px;
      color: #666;
      margin-bottom: 14px;
    }

    /* Sections */
    .section {
      border-bottom: 1px solid #333;
      padding-bottom: 12px;
      margin-bottom: 12px;
    }

    .section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
    }

    /* API key input */
    .api-key-wrap {
      display: flex;
      gap: 6px;
    }

    .api-key-input {
      flex: 1;
      padding: 6px 8px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    .api-key-input:focus {
      border-color: #666;
    }

    .api-key-input::placeholder {
      color: #555;
    }

    .btn-save {
      padding: 6px 12px;
      background: #333;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }

    .btn-save:hover {
      background: #444;
      color: #fff;
    }

    .btn-save.saved {
      background: #166534;
      border-color: #22c55e;
      color: #22c55e;
    }

    .api-status {
      font-size: 11px;
      margin-top: 4px;
      height: 14px;
    }

    .api-status.ok { color: #22c55e; }
    .api-status.missing { color: #f87171; }

    /* Threshold slider */
    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .threshold-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: #444;
      border-radius: 2px;
      outline: none;
    }

    .threshold-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e0e0e0;
      cursor: pointer;
      border: 2px solid #666;
      transition: background 0.15s;
    }

    .threshold-slider::-webkit-slider-thumb:hover {
      background: #fff;
    }

    .threshold-value {
      font-weight: 700;
      color: #fff;
      font-size: 14px;
      min-width: 36px;
      text-align: right;
    }

    .threshold-desc {
      font-size: 11px;
      color: #777;
      margin-top: 4px;
    }

    /* Stats */
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }

    .stat-value {
      font-weight: 700;
      color: #fff;
      font-size: 14px;
    }

    .stat-label {
      color: #999;
    }

    /* Reset button */
    .btn-reset {
      margin-top: 8px;
      width: 100%;
      padding: 6px;
      background: #333;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }

    .btn-reset:hover {
      background: #444;
      color: #fff;
    }
  </style>
</head>
<body>
  <h1>AI Post Detector</h1>
  <div class="version">v2.0 — Claude Haiku scoring</div>

  <div class="section">
    <label for="apiKey">Anthropic API Key</label>
    <div class="api-key-wrap">
      <input type="password" id="apiKey" class="api-key-input" placeholder="sk-ant-..." spellcheck="false" autocomplete="off">
      <button class="btn-save" id="saveKey">Save</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <div class="section">
    <label for="threshold">Collapse posts scoring above:</label>
    <div class="slider-wrap">
      <input type="range" id="threshold" class="threshold-slider" min="0" max="100" value="70">
      <span class="threshold-value" id="thresholdValue">70%</span>
    </div>
    <div class="threshold-desc">Lower = more aggressive filtering</div>
  </div>

  <div class="section">
    <div class="row">
      <span class="stat-label">Posts scanned</span>
      <span class="stat-value" id="scanned">0</span>
    </div>
    <div class="row">
      <span class="stat-label">Posts collapsed</span>
      <span class="stat-value" id="collapsed">0</span>
    </div>
    <button class="btn-reset" id="reset">Reset stats</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
